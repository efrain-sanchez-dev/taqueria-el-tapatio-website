            <hr class="mt-4 mb-5">
          </div>
        </div>
        <div class="row">
          <div class="col-lg-12">

<script src="https://www.google.com/maps/place/Taqueria+El+Tapatío/@36.310808,-119.210337,1003m/data=!3m3!1e3!4b1!5s0x809531b7f193a671:0x22b78989cb3b2bc3!4m6!3m5!1s0x809531b7f21e6f85:0xc4b5ef3130270f79!8m2!3d36.3108037!4d-119.2077621!16s%2Fg%2F1tgfwwmv?entry=ttu&g_ep=EgoyMDI2MDQyMi4wIKXMDSoASAFQAw%3D%3D" defer></script>

 <!-- Contact -->
    <section id="contact">
      <div class="container">
        <div class="row">
          <div class="col-lg-12 text-center">
            <h2 class="section-heading text-white text-uppercase">Contáctenos si tiene alguna pregunta.</h2>
            <hr class="mt-4 mb-5">
          </div>
        </div>
        <div class="row">
          <div class="col-lg-12">
            <form id="contactForm" name="sentMessage" novalidate>
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group">
                    <input class="form-control" id="name" type="text" placeholder="Nome *" required data-validation-required-message="Inserisci il tuo nome.">
                    <p class="help-block text-danger"></p>
                  </div>
                  <div class="form-group">
                    <input class="form-control" id="email" type="email" placeholder="Email *" required data-validation-required-message="Inserisci il tuo indirizzo email.">
                    <p class="help-block text-danger"></p>
                  </div>
                  <div class="form-group">
                    <input class="form-control" id="phone" type="tel" placeholder="Telefono *" required data-validation-required-message="Inserisci il tuo numero di telefono.">
                    <p class="help-block text-danger"></p>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group">
                    <textarea class="form-control" id="message" placeholder="Messaggio *" required data-validation-required-message="Inserisci il tuo messagio."></textarea>
                    <p class="help-block text-danger"></p>
                  </div>
                </div>
                <div class="clearfix"></div>
                <div class="col-lg-12 text-center">
                  <div id="success"></div>
                  <button id="sendMessageButton" class="btn btn-danger btn-big text-uppercase" type="submit">
                    Enviar mensaje
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </section>
